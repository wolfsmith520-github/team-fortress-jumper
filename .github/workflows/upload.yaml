
name: Release

on:
  push:
    tags:
      - "Demo*"
    branches: [ $default-branch ]
  
  # workflow_dispatch:

env:
  GODOT_DOWNLOAD_URL: https://github.com/godotengine/godot-builds/releases/download
  GODOT_VERSION: 4.5.1
  GODOT_CHANNEL: stable
  WORKING_DIRECTORY: .
  ITCHIO_USERNAME: mickeon
  ITCHIO_GAME: team-fortress-jumper

jobs:
  configure-godot:
    runs-on: ubuntu-latest

    steps:
      - name: Cache Godot files
        id: cache-godot
        uses: actions/cache@v3
        with:
          path: |
            ~/.local/share/godot/**
            /usr/local/bin/godot
            ~/.config/godot/**
          key: ${{ runner.os }}-godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_CHANNEL }}
      
      - name: Download and configure Godot Engine's linux executable and templates
        shell: bash
        if: steps.cache-godot.outputs.cache-hit != 'true'
        env:
          GODOT_FULL_VERSION: ${{ env.GODOT_VERSION }}-${{ env.GODOT_CHANNEL}}
          GODOT_FULL_DOWNLOAD_URL: ${{ env.GODOT_DOWNLOAD_URL }}/${{ env.GODOT_VERSION }}-${{ env.GODOT_CHANNEL}}

        run: |
          wget --quiet ${{ env.GODOT_FULL_DOWNLOAD_URL }}/Godot_v${{ env.GODOT_FULL_VERSION }}_linux.x86_64.zip
          wget --quiet ${{ env.GODOT_FULL_DOWNLOAD_URL }}/Godot_v${{ env.GODOT_FULL_VERSION }}_export_templates.tpz
          
          mkdir --parents ~/.config/godot/
          mkdir --parents ~/.local/share/godot/export_templates/${{ env.GODOT_FULL_VERSION }}
          
          unzip Godot_v${{ env.GODOT_FULL_VERSION }}_linux.x86_64.zip
          mv ./Godot_v${{ env.GODOT_FULL_VERSION }}_linux.x86_64 /usr/local/bin/godot
          
          unzip Godot_v${{ env.GODOT_FULL_VERSION }}_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.${{ env.GODOT_CHANNEL }}
          
          rm --force Godot_v${{ env.GODOT_FULL_VERSION }}_linux.x86_64.zip Godot_v${{ env.GODOT_FULL_VERSION }}_export_templates.tpz

  export-builds:
    runs-on: ubuntu-latest
    needs: "configure-godot"
    strategy:
      fail-fast: true
      matrix:
        export: [
          {
            preset_name: Web,
            output_path: .export/web,
            output_filename: index.html,
            itchio_channel: html, #test
          },
          {
            preset_name: Windows Desktop,
            output_path: .export/windows,
            output_filename: team_fortress_jumper_windows.exe,
            itchio_channel: windows, #test2
          },
        ]
    
    # env:
    #   PRESET_NAME: ${{ matrix.export.preset_name }}
    #   OUTPUT_PATH: ${{ matrix.export.output_path }}
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      
      # - name: "I don't know, test"
      #   run: |
      #     echo The preset name is $PRESET_NAME
      #     echo The output path is $OUTPUT_PATH

      - name: Restore Godot cache
        id: cache-godot
        uses: actions/cache@v3
        with:
          path: |
            ~/.local/share/godot/**
            /usr/local/bin/godot
            ~/.config/godot/**
          key: ${{ runner.os }}-godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_CHANNEL }}
      
      - name: Export Godot project (${{ matrix.export.preset_name }})
        shell: bash
        run: |
            mkdir --parents ${{ matrix.export.output_path }}
            godot --headless --quiet --path ${{ env.WORKING_DIRECTORY }} --export-release "${{ matrix.export.preset_name}}" "${{ matrix.export.output_path }}/${{ matrix.export.output_filename }}"

      - name: Upload to itch.io (${{ matrix.export.itchio_channel }})
        uses: dulvui/itchio-butler-upload@v0.0.1
        with:
          working-directory: ${{ matrix.export.output_path }}
          api-key: ${{ secrets.ITCHIO_API_KEY }}
          user: ${{ env.ITCHIO_USERNAME }}
          game: ${{ env.ITCHIO_GAME }}
          channel: ${{ matrix.export.itchio_channel }}
      
      # - name: Upload exported build as artifact
      #   uses: actions/upload-artifact@v2
      #   with:
      #     name: ${{ matrix.export.preset_name }}
      #     path: ${{ matrix.export.output_path }}
      #     retention-days: 1